<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dino Runner</title>
  <link rel="stylesheet" href="dino-game.css" />
</head>
<body>
  <h1>Dino Runner</h1>
  <div id="game-container">
    <canvas id="canvas" width="800" height="220"></canvas>
    <div id="overlay">
      <h2>Dino Runner</h2>
      <p>Press <strong>Space</strong> or <strong>↑</strong> to jump</p>
      <p>Press <strong>↓</strong> to duck</p>
      <p style="margin-top:6px; color:#aaa; font-size:0.78rem;">[ tap screen on mobile ]</p>
    </div>
  </div>
  <div id="score-display">HI: <span id="hi-score">0</span> &nbsp; SCORE: <span id="cur-score">0</span></div>

  <script src="dino-game.js"></script>
</body>
</html>
